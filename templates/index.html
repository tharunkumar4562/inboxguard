<!doctype html>
<html lang="en">
  <head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXGNG9TEFK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WXGNG9TEFK');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title or "InboxGuard | Command Center" }}</title>
    <meta name="description" content="{{ meta_description or 'Command center to check email risk and generate safe rewrites before sending.' }}" />
    <meta property="og:image" content="https://inboxguard.me/static/logo.svg" />
    <meta name="twitter:image" content="https://inboxguard.me/static/logo.svg" />
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
    <link rel="apple-touch-icon" href="/static/logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="h-screen w-full flex bg-[#0B1220] text-white">
      <div class="command-panel w-[28%] border-r border-white/10 p-5 flex flex-col gap-4">
        <a href="/" class="inline-flex items-center gap-2 no-underline text-inherit">
          <img src="/static/logo.svg" width="28" height="28" alt="InboxGuard" />
          <span class="text-xl font-semibold text-blue-300">InboxGuard</span>
        </a>
        <p class="text-xs text-slate-400">COMMAND CENTER</p>

        <textarea
          id="emailInput"
          class="flex-1 bg-[#111827] p-4 rounded-lg border border-white/10 focus:outline-none focus:border-blue-500 resize-none"
          placeholder="Paste your email (Subject + Body)"
        ></textarea>

        <div class="grid gap-2">
          <label for="analysisMode" class="text-xs text-slate-300">Analysis Mode</label>
          <select id="analysisMode" class="bg-[#111827] p-2 rounded-lg border border-white/10 focus:outline-none focus:border-blue-500">
            <option value="content">Content</option>
            <option value="full" selected>Full</option>
          </select>
        </div>

        <div class="grid gap-2">
          <label for="rewriteStyle" class="text-xs text-slate-300">Rewrite Style</label>
          <select id="rewriteStyle" class="bg-[#111827] p-2 rounded-lg border border-white/10 focus:outline-none focus:border-blue-500">
            <option value="safe">Safe</option>
            <option value="balanced" selected>Balanced</option>
            <option value="aggressive">Aggressive</option>
          </select>
        </div>

        <button id="analyzeBtn" class="bg-red-500 hover:bg-red-600 transition-all py-3 rounded-lg font-semibold">
          Check Before Sending
        </button>
      </div>

      <div class="command-panel w-[44%] flex flex-col items-center justify-center relative px-6">
        <div id="analysisSteps" class="hidden flex flex-col gap-3 text-gray-300 w-full max-w-lg">
          <p class="step opacity-30">Checking spam triggers...</p>
          <p class="step opacity-30">Analyzing structure...</p>
          <p class="step opacity-30">Evaluating tone...</p>
          <p class="step opacity-30">Estimating inbox placement...</p>
        </div>

        <div id="decisionBlock" class="hidden text-center max-w-2xl">
          <h1 id="decisionText" class="text-5xl font-bold mb-4"></h1>
          <p id="decisionSub" class="text-gray-300 text-lg"></p>
          <p id="primaryIssue" class="mt-4 text-gray-400 text-sm"></p>
          <div id="learningAdjustments" class="mt-3 text-sm text-yellow-300 text-left max-w-xl mx-auto"></div>
        </div>
      </div>

      <div class="command-panel w-[28%] border-l border-white/10 p-5 flex flex-col gap-4">
        <h2 class="text-lg font-semibold text-green-300">Safer Version</h2>

        <div class="flex flex-col gap-3 flex-1">
          <div>
            <p class="text-xs text-red-400 mb-1">BEFORE</p>
            <div id="beforeBox" class="bg-red-500/10 p-3 rounded text-sm h-40 overflow-auto border border-red-500/20"></div>
          </div>

          <div>
            <p class="text-xs text-green-400 mb-1">AFTER</p>
            <div id="afterBox" class="bg-green-500/10 p-3 rounded text-sm h-40 overflow-auto border border-green-500/20"></div>
            <div id="changeTags" class="flex flex-wrap gap-2 mt-2"></div>
          </div>
        </div>

        <div class="flex gap-2 mt-1">
          <button id="feedbackInbox" class="bg-green-500 px-3 py-1 rounded text-sm">Inbox</button>
          <button id="feedbackSpam" class="bg-red-500 px-3 py-1 rounded text-sm">Spam</button>
          <button id="feedbackNotSure" class="bg-slate-500 px-3 py-1 rounded text-sm">Not Sure</button>
        </div>
        <p id="feedbackState" class="text-xs text-slate-400"></p>

        <button id="useRewrite" class="bg-green-500 hover:bg-green-600 py-3 rounded-lg font-semibold hidden">
          Send Safer Version
        </button>
      </div>
    </div>

    <div id="fullscreenDecision" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
      <div class="text-center px-6">
        <h1 id="fsDecision" class="text-6xl font-bold mb-4"></h1>
        <p id="fsSub" class="text-gray-300 text-xl"></p>
      </div>
    </div>

    <script src="/static/js/app.js?v=20260404-cc2"></script>
  </body>
</html>
