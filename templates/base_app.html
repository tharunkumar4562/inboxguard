    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem("ig_theme");
          const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : (systemDark ? "dark" : "light");
          const root = document.documentElement;
          root.dataset.theme = theme;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme === "dark" ? "dark" : "light";
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute("content", theme === "dark" ? "#111c2d" : "#f8f9ff");
          }
        } catch (error) {
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/css/cookie-consent.css?v=20260410-cookie-consent-1" />

  <body class="bg-background dark:bg-on-secondary-fixed text-on-surface dark:text-secondary-fixed font-body-md antialiased min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <nav class="bg-surface dark:bg-on-secondary-fixed docked full-width top-0 border-b border-outline-variant dark:border-outline flat no shadows z-50 sticky">
      <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop max-w-[1440px] mx-auto h-16">
        <div class="flex items-center gap-lg">
          <a class="text-headline-sm font-headline-sm font-bold text-primary dark:text-primary-fixed flex items-center gap-xs" href="/">
            <span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">security</span>
            InboxGuard
          </a>
        </div>
        <div class="flex items-center gap-md">
          <button id="theme-toggle" type="button" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed-dim transition-colors font-body-md text-body-md" data-theme-toggle aria-pressed="false">🌙 Dark</button>
          <button id="get-access-btn" type="button" class="bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md text-label-md hover:opacity-90 transition-opacity" onclick="openPricingModal()">Get Access</button>
        </div>
      </div>
    </nav>

    <div class="flex-grow flex w-full max-w-[1440px] mx-auto">
      <!-- SideNavBar Desktop -->
      <aside class="hidden lg:flex flex-col p-md gap-base bg-surface-container-low dark:bg-on-secondary-fixed border-r border-outline-variant dark:border-outline flat no shadows w-[280px] flex-shrink-0 h-[calc(100vh-64px)] sticky top-16 overflow-y-auto">
        {% include 'components/sidebar.html' %}
      </aside>

      <!-- Main Content -->
      <main class="flex-grow p-margin-mobile md:p-margin-desktop bg-surface dark:bg-on-secondary-fixed">
        {% block content %}{% endblock %}
      </main>
    </div>

    <!-- Cookie Consent Banner -->
    <div id="cookie-banner" class="cookie-banner hidden" role="dialog" aria-live="polite" aria-label="Cookie consent" aria-hidden="true">
      <p>We use cookies to keep you signed in and improve your experience.</p>
      <div class="cookie-banner__actions">
        <button type="button" class="cookie-banner__button" data-cookie-accept>Accept</button>
      </div>
    </div>

    <script src="/static/js/cookie-consent.js?v=20260410-cookie-consent-1"></script>
    <script src="/static/js/flow.js?v=20260407-flow-controller-1"></script>

        Built by M.Tharun Kumar • Used by 100+ users across multiple countries

    </footer>
