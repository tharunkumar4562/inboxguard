<!doctype html>
<html class="light" lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXGNG9TEFK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WXGNG9TEFK');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8f9ff" />
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem("ig_theme");
          const theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : "light";
          const root = document.documentElement;
          root.dataset.theme = theme;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme === "dark" ? "dark" : "light";
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute("content", theme === "dark" ? "#111c2d" : "#f8f9ff");
          }
        } catch (error) {}
      })();
    </script>
    <title>{{ page_title or 'InboxGuard Authentication' }}</title>
    <meta name="description" content="{{ meta_description or 'Sign in to your InboxGuard account.' }}" />
    <link rel="canonical" href="{{ canonical_url or 'https://inboxguard.me/login' }}" />
    <link rel="icon" type="image/png" href="/static/branding/logo.png" />
    <link rel="shortcut icon" href="/static/branding/logo.png" />
    <link rel="stylesheet" href="/static/css/compiled-tailwind.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-[#f8f9ff] dark:bg-[#111c2d] text-[#0b1c30] dark:text-[#d8e3fb] font-sans min-h-screen antialiased flex flex-col justify-between">
    <!-- Navbar -->
    <nav class="border-b border-[#bccac1] dark:border-[#6d7a73] py-4 bg-white dark:bg-[#111c2d] sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
        <a class="text-xl font-bold text-[#00694c] dark:text-[#86f8c9] flex items-center gap-2 no-underline" href="/">
          <span class="material-symbols-outlined fill-icon" style="font-variation-settings: 'FILL' 1;">security</span>
          InboxGuard
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md bg-white dark:bg-[#111c2d] rounded-3xl border border-[#bccac1] dark:border-[#6d7a73] p-8 shadow-2xl space-y-6">
        <div class="text-center">
          <h1 id="auth-title" class="text-2xl font-bold text-[#0b1c30] dark:text-[#d8e3fb]">Continue Your Scans</h1>
          <p id="auth-subtitle" class="text-sm text-[#3d4943] dark:text-[#bcc7de] mt-2">Sign in or create an account to start tracking spam-check history.</p>
        </div>

        {% if google_enabled %}
        <a href="/auth/google/login" class="w-full inline-flex items-center justify-center gap-2 rounded-xl bg-blue-600 hover:bg-blue-700 px-6 py-3 text-base font-bold text-white shadow-md transition no-underline">
          <span class="material-symbols-outlined">login</span>
          Sign in with Google
        </a>
        {% endif %}

        <div class="relative flex items-center justify-center my-4">
          <div class="absolute inset-0 border-t border-[#bccac1] dark:border-[#6d7a73]"></div>
          <span class="relative px-3 bg-white dark:bg-[#111c2d] text-xs uppercase tracking-wider text-[#545f73] dark:text-[#bcc7de]">or</span>
        </div>

        <form id="auth-form" class="space-y-4">
          <div>
            <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-[#545f73] dark:text-[#bcc7de] mb-2">Email Address</label>
            <input id="email" name="email" type="email" required class="w-full rounded-xl border border-[#bccac1] dark:border-[#6d7a73] bg-[#f8f9ff] dark:bg-[#111c2d] text-[#0b1c30] dark:text-[#d8e3fb] focus:ring-2 focus:ring-[#00694c] focus:border-[#00694c] text-sm" placeholder="you@company.com" />
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-[#545f73] dark:text-[#bcc7de]">Password</label>
              <a href="/forgot-password" class="text-xs text-[#00694c] dark:text-[#86f8c9] hover:underline">Forgot password?</a>
            </div>
            <input id="password" name="password" type="password" required class="w-full rounded-xl border border-[#bccac1] dark:border-[#6d7a73] bg-[#f8f9ff] dark:bg-[#111c2d] text-[#0b1c30] dark:text-[#d8e3fb] focus:ring-2 focus:ring-[#00694c] focus:border-[#00694c] text-sm" placeholder="At least 8 characters" />
          </div>

          <button id="auth-submit" type="submit" class="w-full bg-[#00694c] hover:bg-[#00513a] text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
            <span>Sign In</span>
          </button>
          
          <div class="text-center text-xs pt-2">
            <span class="text-[#3d4943] dark:text-[#bcc7de]">Don't have an account?</span>
            <button id="toggle-mode" type="button" class="font-semibold text-[#00694c] dark:text-[#86f8c9] hover:underline ml-1">Create one</button>
          </div>
          
          <p id="auth-msg" class="text-center text-xs text-rose-600 dark:text-rose-400 mt-2"></p>
        </form>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-[#bccac1] dark:border-[#6d7a73] py-4 text-center text-xs text-[#545f73] dark:text-[#bcc7de]">
      Built by M.Tharun Kumar • InboxGuard Deliverability Suite
    </footer>

    <script>
      (function () {
        const form = document.getElementById("auth-form");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("auth-submit");
        const toggleMode = document.getElementById("toggle-mode");
        const title = document.getElementById("auth-title");
        const subtitle = document.getElementById("auth-subtitle");
        const msg = document.getElementById("auth-msg");
        if (!form || !emailInput || !passwordInput || !submitBtn || !toggleMode || !msg) {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const resume = params.get("resume") === "1" ? "1" : "0";
        let mode = (params.get("mode") || "signin").toLowerCase() === "signup" ? "signup" : "signin";

        // Check path to set initial mode if navigation slug matches /signup
        if (window.location.pathname.endsWith("/signup")) {
          mode = "signup";
        }

        function renderMode() {
          if (mode === "signup") {
            title.textContent = "Create an Account";
            subtitle.textContent = "Sign up now to scan and optimize email deliverability.";
            submitBtn.textContent = "Create Account";
            toggleMode.textContent = "Sign in";
          } else {
            title.textContent = "Continue Your Scans";
            subtitle.textContent = "Sign in or create an account to start tracking spam-check history.";
            submitBtn.textContent = "Sign In";
            toggleMode.textContent = "Create one";
          }
          msg.textContent = "";
        }

        toggleMode.addEventListener("click", function () {
          mode = mode === "signin" ? "signup" : "signin";
          renderMode();
        });

        renderMode();

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          const email = (emailInput.value || "").trim().toLowerCase();
          const password = (passwordInput.value || "").trim();

          if (!email || !password) {
            msg.textContent = "Email and password are required.";
            return;
          }

          const payload = new FormData();
          payload.set("email", email);
          payload.set("password", password);

          const endpoint = mode === "signup" ? "/signup" : "/login";
          submitBtn.disabled = true;

          fetch(endpoint, {
            method: "POST",
            body: payload,
            keepalive: true,
          })
            .then(async function (response) {
              const body = await response.json().catch(function () { return {}; });
              if (!response.ok) {
                throw new Error(body.detail || "Authentication failed.");
              }
              window.location.href = resume === "1" ? "/?resume=1" : "/";
            })
            .catch(function (error) {
              msg.textContent = error && error.message ? error.message : "Authentication failed.";
            })
            .finally(function () {
              submitBtn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
