<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXGNG9TEFK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-WXGNG9TEFK');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description }}" />
    <link rel="canonical" href="{{ canonical_url }}" />
    <meta property="og:title" content="{{ page_title }}" />
    <meta property="og:description" content="{{ meta_description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ canonical_url }}" />
    <meta property="og:image" content="https://inboxguard.me/static/thumbnail-1200x630.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page_title }}" />
    <meta name="twitter:description" content="{{ meta_description }}" />
    <meta name="twitter:image" content="https://inboxguard.me/static/thumbnail-1200x630.png" />
    <link rel="icon" href="/static/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16.png" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/static/favicon/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="bg-ink text-slate-100 min-h-screen antialiased">
    <main class="mx-auto max-w-3xl px-5 py-10 md:py-14">
      <div class="mb-10 flex items-center justify-between border-b border-slate-800/70 pb-4">
        <a href="/" class="logo-wrap no-underline">
          <img src="/static/branding/logo-wordmark.svg" alt="InboxGuard" style="display:block; width: 172px; max-width: 100%;" />
        </a>
      </div>

      <section class="rounded-3xl border border-slate-700 bg-slate-900/80 p-6 shadow-2xl">
        <h1 class="text-3xl font-bold">Continue Your Scans</h1>
        <p class="mt-3 text-slate-300">Create an account or sign in to keep scanning and save usage history.</p>

        {% if google_enabled %}
        <a href="/auth/google/login" class="mt-6 w-full inline-flex items-center justify-center rounded-2xl bg-blue-600 px-6 py-3 text-base font-bold text-white shadow-lg shadow-blue-900/40 transition hover:bg-blue-700 no-underline">
          Sign in with Google
        </a>
        {% else %}
        <button type="button" disabled class="mt-6 w-full rounded-2xl bg-slate-700/60 px-6 py-3 text-base font-bold text-slate-300 cursor-not-allowed">
          Sign in with Google (coming soon)
        </button>
        {% endif %}

        <p class="mt-4 text-center text-sm text-slate-400">or</p>

        <form id="auth-form" class="mt-4 space-y-4">
          <div>
            <label for="email" class="mb-2 block text-sm text-slate-300">Email</label>
            <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 p-3 text-sm text-slate-100 outline-none transition focus:border-blue-500" placeholder="you@company.com" />
          </div>
          <div>
            <label for="password" class="mb-2 block text-sm text-slate-300">Password</label>
            <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 p-3 text-sm text-slate-100 outline-none transition focus:border-blue-500" placeholder="At least 8 characters" />
          </div>
          <button id="auth-submit" type="submit" class="w-full rounded-2xl bg-blue-600 px-6 py-3 text-base font-bold text-white shadow-lg shadow-blue-900/40 transition hover:bg-blue-700">
            Sign In
          </button>
          <p class="text-center text-sm text-slate-400">
            Don't have an account?
            <button id="toggle-mode" type="button" class="text-blue-300 hover:text-blue-200">Create one</button>
          </p>
          <p id="auth-msg" class="text-center text-sm text-rose-300"></p>
        </form>
      </section>
    </main>

    <script>
      (function () {
        const form = document.getElementById("auth-form");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("auth-submit");
        const toggleMode = document.getElementById("toggle-mode");
        const msg = document.getElementById("auth-msg");
        if (!form || !emailInput || !passwordInput || !submitBtn || !toggleMode || !msg) {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const resume = params.get("resume") === "1" ? "1" : "0";
        let mode = (params.get("mode") || "signin").toLowerCase() === "signup" ? "signup" : "signin";

        function renderMode() {
          if (mode === "signup") {
            submitBtn.textContent = "Create Account";
            toggleMode.textContent = "Sign in";
          } else {
            submitBtn.textContent = "Sign In";
            toggleMode.textContent = "Create one";
          }
          msg.textContent = "";
        }

        toggleMode.addEventListener("click", function () {
          mode = mode === "signin" ? "signup" : "signin";
          renderMode();
        });

        renderMode();

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          const email = (emailInput.value || "").trim().toLowerCase();
          const password = (passwordInput.value || "").trim();

          if (!email || !password) {
            msg.textContent = "Email and password are required.";
            return;
          }

          const payload = new FormData();
          payload.set("email", email);
          payload.set("password", password);

          const endpoint = mode === "signup" ? "/signup" : "/login";
          submitBtn.disabled = true;

          fetch(endpoint, {
            method: "POST",
            body: payload,
            keepalive: true,
          })
            .then(async function (response) {
              const body = await response.json().catch(function () { return {}; });
              if (!response.ok) {
                throw new Error(body.detail || "Authentication failed.");
              }
              window.location.href = resume === "1" ? "/?resume=1" : "/";
            })
            .catch(function (error) {
              msg.textContent = error && error.message ? error.message : "Authentication failed.";
            })
            .finally(function () {
              submitBtn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
