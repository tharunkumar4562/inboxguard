<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description }}" />
    <link rel="canonical" href="{{ canonical_url }}" />
    <meta property="og:title" content="{{ page_title }}" />
    <meta property="og:description" content="{{ meta_description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ canonical_url }}" />
    <meta property="og:image" content="https://inboxguard.me/static/thumbnail-1200x630.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page_title }}" />
    <meta name="twitter:description" content="{{ meta_description }}" />
    <meta name="twitter:image" content="https://inboxguard.me/static/thumbnail-1200x630.png" />
    <link rel="icon" href="/static/favicon.svg?v=20260329-shield" type="image/svg+xml" sizes="any" />
    <link rel="icon" href="/static/favicon-48.png?v=20260329-shield" type="image/png" sizes="48x48" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="bg-ink text-slate-100 min-h-screen antialiased">
    <main class="mx-auto max-w-3xl px-5 py-10 md:py-14">
      <div class="mb-10 flex items-center justify-between border-b border-slate-800/70 pb-4">
        <a href="/" class="logo-wrap no-underline">
          <svg class="logo-svg" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M16 3 L26 8 L26 16 C26 22 22 27 16 29 C10 27 6 22 6 16 L6 8 Z" fill="none" stroke="#3B82F6" stroke-width="2"></path>
            <rect x="10" y="11" width="12" height="8" rx="1.5" fill="none" stroke="#93C5FD" stroke-width="1.8"></rect>
            <path d="M10.8 12 L16 15.8 L21.2 12" fill="none" stroke="#93C5FD" stroke-width="1.4"></path>
            <path d="M21 22.5 l2 2 l4 -4" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span class="logo-text">INBOXGUARD</span>
        </a>
      </div>

      <section class="rounded-3xl border border-slate-700 bg-slate-900/80 p-6 shadow-2xl">
        <h1 class="text-3xl font-bold">Get Access</h1>
        <p class="mt-3 text-slate-300">Enter your email to unlock the full report instantly.</p>

        <form id="access-form" class="mt-6 space-y-4" action="mailto:inboxguard.beta@gmail.com" method="post" enctype="text/plain">
          <div>
            <label for="email" class="mb-2 block text-sm text-slate-300">Work email</label>
            <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 p-3 text-sm text-slate-100 outline-none transition focus:border-blue-500" placeholder="you@company.com" />
          </div>
          <button type="submit" class="w-full rounded-2xl bg-blue-600 px-6 py-3 text-base font-bold text-white shadow-lg shadow-blue-900/40 transition hover:bg-blue-700">
            Unlock Full Report
          </button>
          <p class="text-center text-xs text-slate-400">Need urgent report access? Use WhatsApp unlock on the scan page.</p>
        </form>
      </section>
    </main>

    <script>
      (function () {
        const form = document.getElementById("access-form");
        const emailInput = document.getElementById("email");
        if (!form || !emailInput) {
          return;
        }

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          const email = (emailInput.value || "").trim();
          const payload = new FormData();
          payload.set("email", email);

          fetch("/request-access", {
            method: "POST",
            body: payload,
            keepalive: true,
          })
            .catch(function () {
              // Keep UX resilient even if tracking endpoint fails.
            })
            .finally(function () {
              const subject = encodeURIComponent("InboxGuard Access Request");
              const body = encodeURIComponent("Email: " + email);
              window.location.href = "mailto:inboxguard.beta@gmail.com?subject=" + subject + "&body=" + body;
            });
        });
      })();
    </script>
  </body>
</html>
