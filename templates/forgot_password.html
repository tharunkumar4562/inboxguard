<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | InboxGuard</title>
    <meta name="description" content="Request a password reset link for your InboxGuard account." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/static/css/compiled-tailwind.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem("ig_theme");
          const theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : "light";
          const root = document.documentElement;
          root.dataset.theme = theme;
          root.classList.toggle("dark", theme === "dark");
        } catch (error) {}
      })();
    </script>
  </head>
  <body class="bg-[#f8f9ff] dark:bg-[#111c2d] text-[#0b1c30] dark:text-[#d8e3fb] font-sans min-h-screen antialiased flex flex-col justify-between">
    <!-- Navbar -->
    <nav class="border-b border-[#bccac1] dark:border-[#6d7a73] py-4 bg-white dark:bg-[#111c2d] sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
        <a class="text-xl font-bold text-[#00694c] dark:text-[#86f8c9] flex items-center gap-2 no-underline" href="/">
          <span class="material-symbols-outlined fill-icon" style="font-variation-settings: 'FILL' 1;">security</span>
          InboxGuard
        </a>
        <a class="text-sm font-semibold text-[#545f73] dark:text-[#bcc7de] hover:text-[#00694c] transition-colors" href="/login">Back to Sign In</a>
      </div>
    </nav>

    <!-- Main Card -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md bg-white dark:bg-[#111c2d] rounded-3xl border border-[#bccac1] dark:border-[#6d7a73] p-8 shadow-2xl space-y-6">
        <div class="text-center">
          <div class="mx-auto w-12 h-12 rounded-full bg-[#d4f8e6] dark:bg-[#00513a] flex items-center justify-center text-[#00694c] dark:text-[#86f8c9] mb-4">
            <span class="material-symbols-outlined text-[28px]">lock_reset</span>
          </div>
          <h1 class="text-2xl font-bold text-[#0b1c30] dark:text-[#d8e3fb]">Forgot Password?</h1>
          <p class="text-sm text-[#3d4943] dark:text-[#bcc7de] mt-2">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <form id="forgot-form" class="space-y-4">
          <div>
            <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-[#545f73] dark:text-[#bcc7de] mb-2">Email Address</label>
            <input type="email" id="email" required placeholder="name@company.com" class="w-full rounded-xl border border-[#bccac1] dark:border-[#6d7a73] bg-[#f8f9ff] dark:bg-[#111c2d] text-[#0b1c30] dark:text-[#d8e3fb] focus:ring-2 focus:ring-[#00694c] focus:border-[#00694c]" />
          </div>

          <div id="status-message" class="hidden text-sm p-3.5 rounded-xl"></div>

          <button type="submit" class="w-full bg-[#00694c] hover:bg-[#00513a] text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
            <span>Send Reset Link</span>
          </button>
        </form>

        <div class="text-center text-xs">
          <span class="text-[#3d4943] dark:text-[#bcc7de]">Remember your password?</span>
          <a class="font-semibold text-[#00694c] dark:text-[#86f8c9] hover:underline ml-1" href="/login">Sign In</a>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-[#bccac1] dark:border-[#6d7a73] py-4 text-center text-xs text-[#545f73] dark:text-[#bcc7de]">
      Built by M.Tharun Kumar • InboxGuard Deliverability Suite
    </footer>

    <script>
      const form = document.getElementById("forgot-form");
      const statusMsg = document.getElementById("status-message");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;

        try {
          const res = await fetch("/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({ email })
          });
          const data = await res.json();

          statusMsg.classList.remove("hidden", "bg-green-100", "text-green-800", "bg-red-100", "text-red-800");
          if (data.ok) {
            statusMsg.classList.add("bg-green-100", "text-green-800");
            statusMsg.textContent = data.message || "A secure reset link has been dispatched to your inbox.";
            form.querySelector("button").disabled = true;
            form.querySelector("button").classList.add("opacity-50");
          } else {
            statusMsg.classList.add("bg-red-100", "text-red-800");
            statusMsg.textContent = data.error || "An error occurred. Please try again.";
          }
        } catch (err) {
          statusMsg.classList.remove("hidden", "bg-green-100", "text-green-800");
          statusMsg.classList.add("bg-red-100", "text-red-800");
          statusMsg.textContent = "Unable to connect to the server. Please check your internet connection.";
        }
      });
    </script>
  </body>
</html>
