  </defs>

  <!-- outer shield ring -->
  <path d="M256 36 434 102 418 288 256 452 94 288 78 102Z" fill="none" stroke="url(#shieldGrad)" stroke-width="22" stroke-linejoin="round" stroke-linecap="round" />

