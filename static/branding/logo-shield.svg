  <!-- top-right accents -->
  <path d="M330 142c16 2 31 10 41 24" fill="none" stroke="url(#accentGrad)" stroke-width="14" stroke-linecap="round" />
  <circle cx="368" cy="128" r="8" fill="#FFFFFF" />
  <circle cx="390" cy="150" r="8" fill="#FFFFFF" />
