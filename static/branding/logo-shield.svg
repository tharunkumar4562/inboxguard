<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="InboxGuard shield logo">
  <defs>
    <linearGradient id="shieldGrad" x1="60" y1="70" x2="460" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B43B8" />
      <stop offset="55%" stop-color="#1E73E9" />
      <stop offset="100%" stop-color="#33D3A6" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="140" y1="140" x2="360" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0952B1" />
      <stop offset="100%" stop-color="#0D4DA8" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="330" y1="140" x2="430" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#29C5AE" />
      <stop offset="100%" stop-color="#55E0B8" />
