  <path d="M256 145c-62 0-112 50-112 112s50 112 112 112c30 0 58-12 79-31l-21-24c-15 13-34 20-55 20-46 0-83-37-83-83s37-83 83-83c27 0 50 13 65 35h-67v30h98c1-6 2-12 2-18 0-72-58-130-130-130z" fill="url(#innerGrad)" />
  <path d="M210 214 307 138 327 160 229 236z" fill="#FFFFFF" />
  <path d="M210 214c17-18 40-29 67-29 29 0 56 14 72 37" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" />
  <path d="M186 300c21 22 51 36 86 36" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" />

  <!-- blue-to-teal right sweep -->
